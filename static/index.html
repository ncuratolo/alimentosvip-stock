<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Alimentos VIP</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<header>
  <h1>📦 Stock Alimentos VIP</h1>
  <p class="subtitle">Registro de productos en tiempo real</p>
</header>

<main>
  <section class="card">
    <h2>Nuevo producto</h2>
    <form id="form-producto" class="row">
      <input type="text" id="nombre" placeholder="Nombre del producto" required>
      <input type="text" id="unidad" placeholder="Unidad (kg, unidades, cajas...)" value="unidades">
      <input type="number" id="stock_inicial" placeholder="Stock inicial" value="0" step="any">
      <button type="submit">Agregar producto</button>
    </form>
  </section>

  <section class="card">
    <h2>Productos</h2>
    <input type="text" id="buscador" placeholder="Buscar producto..." class="buscador">
    <table id="tabla-productos">
      <thead>
        <tr>
          <th>Producto</th>
          <th>Stock</th>
          <th>Unidad</th>
          <th>Movimiento</th>
          <th></th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </section>

  <section class="card">
    <h2>Últimos movimientos</h2>
    <table>
      <thead>
        <tr>
          <th>Fecha</th>
          <th>Producto</th>
          <th>Tipo</th>
          <th>Cantidad</th>
          <th>Nota</th>
        </tr>
      </thead>
      <tbody id="tabla-movimientos"></tbody>
    </table>
  </section>
</main>

<div id="toast"></div>

<script src="/app.js"></script>
</body>
</html>
